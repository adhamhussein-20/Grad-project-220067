{% extends "base.html" %}
{% block title %}Register — MediTrack{% endblock %}
{% block content %}
<div class="card auth-card">
    <h1>📝 Patient Registration</h1>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <div class="grid grid-2">
            <div class="form-group"><label>First Name *</label><input type="text" name="first_name" required></div>
            <div class="form-group"><label>Second Name *</label><input type="text" name="second_name" required></div>
        </div>
        <div class="form-group"><label>Username *</label><input type="text" name="username" required></div>
        <div class="form-group"><label>Age *</label><input type="number" name="age" value="30" min="1" max="120" required></div>
        <div class="form-group"><label>Egyptian National ID (14 digits) *</label><input type="text" name="national_id" maxlength="14" required></div>
        <div class="form-group"><label>Phone Number *</label><input type="text" name="phone" required></div>
        <div class="grid grid-2">
            <div class="form-group"><label>Password (min 8 chars, 1 uppercase, 1 digit) *</label><input type="password" name="password" required></div>
            <div class="form-group"><label>Re-enter Password *</label><input type="password" name="password2" required></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">
        Already registered? <a href="{{ url_for('auth.login') }}" style="color:#2563eb;font-weight:600">Login</a>
    </p>
</div>
{% endblock %}
